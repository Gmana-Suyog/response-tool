apiVersion: apps/v1
kind: Deployment
metadata:
  name: response-tool-frontend
  labels:
    app: response-tool-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: response-tool-frontend
  template:
    metadata:
      labels:
        app: response-tool-frontend
    spec:
      containers:
        - name: frontend
          image: response-tool-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: "http://backend-service:3001"
            - name: VITE_NODE_ENV
              value: "production"
