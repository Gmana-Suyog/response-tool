version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: hls-qa-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    environment:
      - MONGO_INITDB_DATABASE=hls-qa-tool
    networks:
      - hls-qa-network-dev

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: hls-qa-server-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/hls-qa-tool
      - SERVER_BASE_URL=http://localhost:3001
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_key}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-dev_refresh_token_secret_key}
      - JWT_ACCESS_TOKEN_EXPIRY=1h
      - JWT_REFRESH_TOKEN_EXPIRY=7d
      - HLS_DIR=/app/hls
      - DASH_DIR=/app/dash
      - MAX_SCENARIO_SIZE_MB=1000
      - DOWNLOAD_TIMEOUT_MS=30000
      - MAX_CONCURRENT_DOWNLOADS=5
      - SEGMENT_RETRY_ATTEMPTS=3
      - DEFAULT_SEGMENT_COUNT=6
      - MAX_PROFILE_COUNT=10
    volumes:
      - ./server:/app
      - /app/node_modules
      - server_hls_dev:/app/hls
      - server_dash_dev:/app/dash
      - server_vmap_dev:/app/vmap
      - server_vast_dev:/app/vast
      - server_mp4_dev:/app/mp4
      - server_gif_dev:/app/gif
      - server_vod_dev:/app/vod
      - server_logs_dev:/app/logs
    depends_on:
      - mongodb
    networks:
      - hls-qa-network-dev
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: hls-qa-client-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - hls-qa-network-dev
    command: npm run dev

volumes:
  mongodb_data_dev:
    driver: local
  server_hls_dev:
    driver: local
  server_dash_dev:
    driver: local
  server_vmap_dev:
    driver: local
  server_vast_dev:
    driver: local
  server_mp4_dev:
    driver: local
  server_gif_dev:
    driver: local
  server_vod_dev:
    driver: local
  server_logs_dev:
    driver: local

networks:
  hls-qa-network-dev:
    driver: bridge
